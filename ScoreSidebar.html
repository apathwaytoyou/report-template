<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      font-size: 12px;
      padding: 10px 12px;
      color: #2c2c2c;
      background: #fff;
      margin: 0;
    }

    h2 {
      font-size: 14px;
      margin: 0 0 4px;
      color: #1a1a2e;
    }

    .hint {
      font-size: 10.5px;
      color: #888;
      margin-bottom: 10px;
      line-height: 1.5;
    }

    .top-bar {
      display: flex;
      gap: 6px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .section {
      border: 1px solid #ddd;
      border-radius: 6px;
      margin-bottom: 8px;
      overflow: hidden;
    }

    .section-header {
      padding: 7px 10px;
      font-weight: 700;
      font-size: 12px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      user-select: none;
      color: #1a1a2e;
    }
    .section-header:hover { filter: brightness(0.95); }
    .section-header .arrow { font-size: 10px; color: #666; }

    .section-body {
      padding: 8px 10px;
      display: none;
      border-top: 1px solid #ddd;
    }
    .section-body.open { display: block; }

    .measure {
      margin-bottom: 12px;
      padding-bottom: 12px;
      border-bottom: 1px dashed #e8e8e8;
    }
    .measure:last-child {
      margin-bottom: 0;
      padding-bottom: 0;
      border-bottom: none;
    }

    .measure-label {
      font-weight: 700;
      font-size: 11.5px;
      color: #333;
      margin-bottom: 1px;
    }
    .measure-full {
      font-size: 10.5px;
      color: #777;
      font-style: italic;
      margin-bottom: 6px;
      line-height: 1.4;
    }

    .field-row {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-bottom: 4px;
    }

    .field-row label {
      font-size: 10.5px;
      color: #555;
      font-weight: 600;
    }

    input[type="text"], textarea {
      width: 100%;
      padding: 5px 7px;
      border: 1px solid #bbb;
      border-radius: 4px;
      font-size: 11.5px;
      font-family: inherit;
      background: #fafafa;
    }
    input[type="text"]:focus,
    textarea:focus {
      outline: 2px solid #4285f4;
      border-color: transparent;
      background: #fff;
    }

    textarea {
      height: 46px;
      resize: vertical;
      line-height: 1.4;
    }

    .measure-footer {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 6px;
    }

    .btn {
      padding: 5px 11px;
      border: none;
      border-radius: 4px;
      font-size: 11.5px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
    }
    .btn:disabled { opacity: .4; cursor: default; }
    .btn-save   { background: #1a73e8; color: #fff; }
    .btn-save:hover:not(:disabled) { background: #1557b0; }
    .btn-all    { background: #188038; color: #fff; flex: 1; }
    .btn-all:hover:not(:disabled)  { background: #0f5928; }
    .btn-clear  {
      background: #f1f1f1;
      color: #555;
      border: 1px solid #ccc;
      font-weight: normal;
    }
    .btn-clear:hover { background: #e2e2e2; }

    .measure-msg {
      font-size: 10.5px;
      flex: 1;
      line-height: 1.3;
    }
    .measure-msg.ok   { color: #137333; }
    .measure-msg.err  { color: #c62828; }
    .measure-msg.info { color: #1967d2; }

    .global-msg {
      margin-top: 8px;
      padding: 7px 10px;
      border-radius: 5px;
      font-size: 11.5px;
      line-height: 1.5;
      display: none;
    }
    .global-msg.show { display: block; }
    .global-msg.ok   { background: #e6f4ea; color: #137333; }
    .global-msg.err  { background: #fce8e6; color: #c62828; }
    .global-msg.info { background: #e8f0fe; color: #1967d2; }

    .loading {
      padding: 20px;
      text-align: center;
      color: #888;
      font-style: italic;
    }
  </style>
</head>
<body>

<h2>📊 Score Entry</h2>
<p class="hint">Enter scores per measure. Save individually or use <strong>Save All</strong>.</p>

<div style="margin-bottom: 10px;">
  <button class="btn btn-all" style="background:#37474f;" onclick="doBuildTable()">
    📊 Build Score Table First
  </button>
  <div id="msgBuild" class="global-msg"></div>
</div>

<div id="container">
  <div class="loading">⏳ Loading measures…</div>
</div>

<div class="top-bar" style="margin-top: 12px;">
  <button class="btn btn-all" onclick="saveAll()">💾 Save All</button>
  <button class="btn btn-clear" onclick="clearSidebar()" style="background:#b71c1c; color:#fff; border:none;">🗑 Clear Sidebar</button>
</div>
<div style="margin-top: 6px;">
  <button class="btn btn-all" style="background:#546e7a;" onclick="doTidyTable()">🧹 Tidy Table</button>
  <div id="msgTidy" class="global-msg"></div>
</div>

<div id="globalMsg" class="global-msg"></div>

<script>
  // Group display config — must match GROUP_ORDER in Code.gs
  var GROUP_META = {
    'General'     : { label: 'General',      color: '#e8eaf6' },
    'ADHD'        : { label: 'ADHD',          color: '#e3f2fd' },
    'Autism'      : { label: 'Autism',          color: '#f3e5f5' },
    'Sensory'     : { label: 'Sensory',      color: '#e8f5e9' },
    'Other-Report': { label: 'Other-Report',  color: '#fce4ec' }
  };
  var GROUP_ORDER = ['General', 'ADHD', 'Autism', 'Other-Report'];

  // Populated once measures load
  var allMeasures = [];

  // ── Build UI from measure list ────────────────────────────────────
  function buildUI(measures) {
    allMeasures = measures;
    var container = document.getElementById('container');
    container.innerHTML = '';

    // Group measures
    var grouped = {};
    GROUP_ORDER.forEach(function(g) { grouped[g] = []; });
    measures.forEach(function(m) {
      if (grouped[m.group] !== undefined) grouped[m.group].push(m);
    });

    GROUP_ORDER.forEach(function(group) {
      var groupMeasures = grouped[group];
      if (groupMeasures.length === 0) return;
      var meta = GROUP_META[group];

      // Section wrapper
      var section = document.createElement('div');
      section.className = 'section';

      // Header
      var header = document.createElement('div');
      header.className = 'section-header';
      header.style.backgroundColor = meta.color;
      header.innerHTML = '📊 ' + meta.label + ' <span class="arrow">▶</span>';
      header.onclick = function() { toggleSection(this); };
      section.appendChild(header);

      // Body
      var body = document.createElement('div');
      body.className = 'section-body';

      groupMeasures.forEach(function(m) {
        body.appendChild(buildMeasureBlock(m));
      });

      section.appendChild(body);
      container.appendChild(section);
    });
  }

  function buildMeasureBlock(m) {
    var div = document.createElement('div');
    div.className = 'measure';
    div.id = 'measure-' + m.abbr;

    div.innerHTML =
      '<div class="measure-label">' + escHtml(m.abbr) + '</div>' +
      '<div class="measure-full">'  + escHtml(m.full) + '</div>' +
      '<div class="field-row">' +
        '<label>Score</label>' +
        '<input type="text" id="score-' + escHtml(m.abbr) + '" placeholder="e.g. 42">' +
      '</div>' +
      '<div class="field-row">' +
        '<label>Severity / Percentile</label>' +
        '<input type="text" id="sev-' + escHtml(m.abbr) + '" placeholder="e.g. Moderate, 78th %ile">' +
      '</div>' +
      '<div class="field-row">' +
        '<label>Notes</label>' +
        '<textarea id="notes-' + escHtml(m.abbr) + '" placeholder="Optional notes…"></textarea>' +
      '</div>' +
      '<div class="measure-footer">' +
        '<button class="btn btn-save" onclick="saveOne(\'' + escHtml(m.abbr) + '\')">Save</button>' +
        '<span class="measure-msg" id="msg-' + escHtml(m.abbr) + '"></span>' +
      '</div>';

    return div;
  }

  // ── Toggle section ────────────────────────────────────────────────
  function toggleSection(header) {
    var body  = header.nextElementSibling;
    var arrow = header.querySelector('.arrow');
    var open  = body.classList.toggle('open');
    arrow.textContent = open ? '▼' : '▶';
  }

  // ── Helpers ───────────────────────────────────────────────────────
  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;')
              .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function getFieldValues(abbr) {
    return {
      score    : document.getElementById('score-' + abbr).value.trim(),
      severity : document.getElementById('sev-'   + abbr).value.trim(),
      notes    : document.getElementById('notes-' + abbr).value.trim()
    };
  }

  function setMeasureMsg(abbr, type, text) {
    var el = document.getElementById('msg-' + abbr);
    el.className = 'measure-msg ' + type;
    el.textContent = text;
    setTimeout(function() {
      el.textContent = '';
      el.className = 'measure-msg';
    }, 4000);
  }

  function setGlobalMsg(type, html) {
    var el = document.getElementById('globalMsg');
    el.className = 'global-msg show ' + type;
    el.innerHTML = html;
    setTimeout(function() { el.className = 'global-msg'; }, 6000);
  }

  // ── Save one measure ──────────────────────────────────────────────
  function saveOne(abbr) {
    var vals = getFieldValues(abbr);
    if (!vals.score && !vals.severity && !vals.notes) {
      setMeasureMsg(abbr, 'err', 'Nothing to save.');
      return;
    }
    setMeasureMsg(abbr, 'info', '⏳ Saving…');
    var payload = {};
    payload[abbr] = vals;

    google.script.run
      .withSuccessHandler(function(results) {
        var r = results[0];
        if (r && r.success) {
          setMeasureMsg(abbr, 'ok', '✅ Saved.');
          google.script.run.markMeasuresCompleted([abbr]);
        } else {
          setMeasureMsg(abbr, 'err', '❌ ' + (r ? r.message : 'Unknown error.'));
        }
      })
      .withFailureHandler(function(err) {
        setMeasureMsg(abbr, 'err', '❌ ' + err.message);
      })
      .saveScores(payload);
  }

  // ── Save all filled measures ──────────────────────────────────────
  function saveAll() {
    var count = 0;
    allMeasures.forEach(function(m) {
      var vals = getFieldValues(m.abbr);
      if (!vals) return;
      if (vals.score || vals.severity || vals.notes) {
        saveOne(m.abbr);
        count++;
      }
    });
    if (count === 0) {
      setGlobalMsg('err', '⚠️ No measures have data to save.');
    } else {
      setGlobalMsg('info', '⏳ Saving ' + count + ' measure(s)…');
    }
  }

  // ── Clear sidebar (does NOT touch the document) ───────────────────
  function clearSidebar() {
    if (!confirm('Clear all entries from the sidebar? This does not affect the document.')) return;
    document.querySelectorAll('input[type="text"], textarea').forEach(function(el) {
      el.value = '';
    });
    document.querySelectorAll('.measure-msg').forEach(function(el) {
      el.textContent = '';
      el.className = 'measure-msg';
    });
  }

  // ── Load measures on open ─────────────────────────────────────────
  google.script.run
    .withSuccessHandler(buildUI)
    .withFailureHandler(function(err) {
      document.getElementById('container').innerHTML =
        '<div class="loading" style="color:#c62828">❌ Failed to load measures: ' +
        err.message + '</div>';
    })
    .getActiveMeasures();

    function doBuildTable() {
    setGlobalMsg('info', '⏳ Building score table…');
    google.script.run
      .withSuccessHandler(function() {
        setGlobalMsg('ok', '✅ Score table built. You can now enter scores.');
      })
      .withFailureHandler(function(err) {
        setGlobalMsg('err', '❌ ' + err.message);
      })
      .buildScoreTable();
      google.script.run.scrollToScoreTable();        //added, testing

  }

  function doTidyTable() {
    setGlobalMsg('info', '⏳ Tidying table…');
    google.script.run
      .withSuccessHandler(function() {
        setGlobalMsg('ok', '✅ Table tidied.');
        google.script.run.scrollToScoreTable();
      })
      .withFailureHandler(function(err) {
        setGlobalMsg('err', '❌ ' + err.message);
      })
      .tidyScoreTable();
  }
</script>
</body>
</html>
